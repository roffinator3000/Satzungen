<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Satzung der Fachschaft Informatik</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2a;
      --panel-2: #1a2338;
      --text: #eef2ff;
      --muted: #9fb0d0;
      --border: #2b3958;
      --accent: #7aa2ff;
      --accent-2: #b7cbff;
      --code: #0f1728;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1324 100%);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(19, 26, 42, .88);
      backdrop-filter: blur(10px);
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.45;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      margin: 12px 0 16px;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: .15s ease;
      box-shadow: none;
    }

    .file-btn:hover,
    .file-btn:focus-visible {
      transform: translateY(-1px);
      border-color: var(--accent);
      outline: none;
    }

    .file-btn.active {
      background: rgba(122, 162, 255, .12);
      border-color: var(--accent);
    }

    .file-title {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .file-path {
      display: block;
      color: var(--muted);
      font-size: .86rem;
      word-break: break-all;
    }

    .main {
      min-width: 0;
      padding: 28px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: .92rem;
    }

    .toolbar a,
    .toolbar button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      font-size: .95rem;
    }

    .toolbar a:hover,
    .toolbar button:hover {
      border-color: var(--accent);
    }

    .viewer {
      background: rgba(19, 26, 42, .86);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .status {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: .95rem;
      background: rgba(255,255,255,.02);
    }

    .content {
      padding: 34px;
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      line-height: 1.2;
      margin-top: 1.7em;
      margin-bottom: .65em;
    }

    .content h1 { font-size: 2rem; }
    .content h2 {
      font-size: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: .35em;
    }
    .content h3 { font-size: 1.2rem; }
    .content p,
    .content ul,
    .content ol,
    .content pre,
    .content blockquote {
      margin: 0 0 1em;
    }

    .content a {
      color: var(--accent-2);
      text-decoration: none;
    }

    .content a:hover { text-decoration: underline; }

    .content code {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      padding: .12em .38em;
      border-radius: 8px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: .92em;
    }

    .content pre {
      background: var(--code);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 16px;
      overflow: auto;
    }

    .content pre code {
      background: transparent;
      border: none;
      padding: 0;
    }

    .content blockquote {
      border-left: 4px solid var(--accent);
      margin-left: 0;
      padding: 4px 0 4px 14px;
      color: var(--muted);
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1em;
      display: block;
      overflow-x: auto;
    }

    .content th,
    .content td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .main {
        padding: 16px;
      }
      .content {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Markdown Viewer</h1>
        <p>Einfache GitHub-Pages-Ansicht für Dateien aus dem <code>pages</code>-Ordner.</p>
      </div>

      <input id="search" class="search" type="search" placeholder="Dateien filtern..." aria-label="Dateien filtern">

      <nav id="fileList" class="file-list" aria-label="Markdown-Dateien"></nav>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-left">
          <div id="currentFile" class="pill">Keine Datei geladen</div>
          <div class="pill">Ordner: <code>pages/</code></div>
        </div>
        <div class="toolbar-left">
          <a id="rawLink" href="#" target="_blank" rel="noopener noreferrer">Datei öffnen</a>
          <button id="copyLinkBtn" type="button">Direktlink kopieren</button>
        </div>
      </div>

      <section class="viewer">
        <div id="status" class="status">Bereit.</div>
        <article id="content" class="content">
          <h1>Willkommen</h1>
          <p>Wähle links eine Markdown-Datei aus. Die Inhalte werden direkt aus dem <code>pages</code>-Ordner geladen.</p>
        </article>
      </section>
    </main>
  </div>

  <script>
    const FILES = [
      {
        title: 'Satzung Fachschaft Informatik',
        path: 'pages/0-main.md'
      },
      {
        title: '1-Fachschaft',
        path: 'pages/1-Fachschaft.md'
      },
      {
        title: '2-Fachschaftsrat',
        path: 'pages/2-Fachschaftsrat.md'
      },
      {
        title: '3-Ressorts',
        path: 'pages/3-Ressorts.md'
      },
      {
        title: '4-Schlussbestimmungen',
        path: 'pages/4-Schlussbestimmungen.md'
      }
    ];

    const fileList = document.getElementById('fileList');
    const searchInput = document.getElementById('search');
    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('content');
    const currentFileEl = document.getElementById('currentFile');
    const rawLinkEl = document.getElementById('rawLink');
    const copyLinkBtn = document.getElementById('copyLinkBtn');

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/[§]/g, '')
        .replace(/[^a-z0-9äöüß\s-]/gi, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function parseInline(text) {
      let out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      return out;
    }

    function renderMarkdown(md) {
      const lines = md.replace(/\r\n/g, '\n').split('\n');
      let html = '';
      let inUl = false;
      let inOl = false;
      let inCode = false;
      let inBlockquote = false;
      let paragraph = [];

      function flushParagraph() {
        if (paragraph.length) {
          html += `<p>${parseInline(paragraph.join(' '))}</p>`;
          paragraph = [];
        }
      }

      function closeLists() {
        if (inUl) { html += '</ul>'; inUl = false; }
        if (inOl) { html += '</ol>'; inOl = false; }
      }

      function closeBlockquote() {
        if (inBlockquote) {
          flushParagraph();
          html += '</blockquote>';
          inBlockquote = false;
        }
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('```')) {
          closeLists();
          closeBlockquote();
          flushParagraph();
          if (!inCode) {
            inCode = true;
            html += '<pre><code>';
          } else {
            inCode = false;
            html += '</code></pre>';
          }
          continue;
        }

        if (inCode) {
          html += escapeHtml(line) + '\n';
          continue;
        }

        if (!line.trim()) {
          flushParagraph();
          closeLists();
          closeBlockquote();
          continue;
        }

        const heading = line.match(/^(#{1,6})\s+(.*)$/);
        if (heading) {
          flushParagraph();
          closeLists();
          closeBlockquote();
          const level = heading[1].length;
          const text = heading[2].trim();
          const id = slugify(text);
          html += `<h${level} id="${id}">${parseInline(text)}</h${level}>`;
          continue;
        }

        if (line.startsWith('> ')) {
          flushParagraph();
          closeLists();
          if (!inBlockquote) {
            html += '<blockquote>';
            inBlockquote = true;
          }
          paragraph.push(line.slice(2).trim());
          continue;
        }

        const ul = line.match(/^\s*[-*]\s+(.*)$/);
        if (ul) {
          flushParagraph();
          closeBlockquote();
          if (inOl) { html += '</ol>'; inOl = false; }
          if (!inUl) { html += '<ul>'; inUl = true; }
          html += `<li>${parseInline(ul[1])}</li>`;
          continue;
        }

        const ol = line.match(/^\s*\d+\.\s+(.*)$/);
        if (ol) {
          flushParagraph();
          closeBlockquote();
          if (inUl) { html += '</ul>'; inUl = false; }
          if (!inOl) { html += '<ol>'; inOl = true; }
          html += `<li>${parseInline(ol[1])}</li>`;
          continue;
        }

        if (/^---+$/.test(line.trim())) {
          flushParagraph();
          closeLists();
          closeBlockquote();
          html += '<hr>';
          continue;
        }

        paragraph.push(line.trim());
      }

      flushParagraph();
      closeLists();
      closeBlockquote();

      return html;
    }

    function renderFileButtons(filter = '') {
      fileList.innerHTML = '';
      const needle = filter.trim().toLowerCase();

      FILES
        .filter(file => !needle || file.title.toLowerCase().includes(needle) || file.path.toLowerCase().includes(needle))
        .forEach(file => {
          const btn = document.createElement('button');
          btn.className = 'file-btn';
          btn.type = 'button';
          btn.dataset.path = file.path;
          btn.innerHTML = `<span class="file-title">${file.title}</span><span class="file-path">${file.path}</span>`;
          btn.addEventListener('click', () => openFile(file.path));
          fileList.appendChild(btn);
        });
    }

    async function openFile(path) {
      try {
        setActive(path);
        statusEl.textContent = `Lade ${path} ...`;
        currentFileEl.textContent = path;
        rawLinkEl.href = path;
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const markdown = await response.text();
        contentEl.innerHTML = renderMarkdown(markdown);
        statusEl.textContent = `Geladen: ${path}`;
        const url = new URL(window.location.href);
        url.hash = `file=${encodeURIComponent(path)}`;
        history.replaceState(null, '', url);
      } catch (error) {
        contentEl.innerHTML = `
          <h1>Datei konnte nicht geladen werden</h1>
          <p class="muted">Pfad: <code>${escapeHtml(path)}</code></p>
          <p class="muted">Fehler: <code>${escapeHtml(String(error.message || error))}</code></p>
          <p>Prüfe, ob die Datei im Repository vorhanden ist und GitHub Pages den Pfad korrekt ausliefert.</p>
        `;
        statusEl.textContent = 'Fehler beim Laden.';
      }
    }

    function setActive(path) {
      [...document.querySelectorAll('.file-btn')].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.path === path);
      });
    }

    function getInitialPath() {
      const hash = window.location.hash || '';
      const match = hash.match(/file=([^&]+)/);
      if (match) {
        return decodeURIComponent(match[1]);
      }
      return FILES[0]?.path || null;
    }

    copyLinkBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(window.location.href);
        statusEl.textContent = 'Direktlink kopiert.';
      } catch {
        statusEl.textContent = 'Kopieren nicht möglich.';
      }
    });

    searchInput.addEventListener('input', (event) => {
      renderFileButtons(event.target.value);
      setActive(currentFileEl.textContent);
    });

    window.addEventListener('hashchange', () => {
      const path = getInitialPath();
      if (path) openFile(path);
    });

    renderFileButtons();
    const initialPath = getInitialPath();
    if (initialPath) {
      openFile(initialPath);
    }
  </script>
</body>
</html>
