<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Satzung der Fachschaft Informatik</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2a;
      --panel-2: #1a2338;
      --text: #eef2ff;
      --muted: #9fb0d0;
      --border: #2b3958;
      --accent: #7aa2ff;
      --accent-2: #b7cbff;
      --code: #0f1728;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1324 100%);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(19, 26, 42, .88);
      backdrop-filter: blur(10px);
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.45;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      margin: 12px 0 16px;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-title {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .file-path {
      display: block;
      color: var(--muted);
      font-size: .86rem;
      word-break: break-all;
    }

    .main {
      min-width: 0;
      padding: 28px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: .92rem;
    }

    .viewer {
      background: rgba(19, 26, 42, .86);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .status {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: .95rem;
      background: rgba(255,255,255,.02);
    }

    .content {
      padding: 34px;
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      line-height: 1.2;
      margin-top: 1.7em;
      margin-bottom: .65em;
    }

    .content h1 { font-size: 2rem; }
    .content h2 {
      font-size: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: .35em;
    }
    .content h3 { font-size: 1.2rem; }
    .content p,
    .content ul,
    .content ol,
    .content pre,
    .content blockquote {
      margin: 0 0 1em;
    }

    .content a {
      color: var(--accent-2);
      text-decoration: none;
    }

    .content a:hover { text-decoration: underline; }

    .content code {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      padding: .12em .38em;
      border-radius: 8px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: .92em;
    }

    .content pre {
      background: var(--code);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 16px;
      overflow: auto;
    }

    .content pre code {
      background: transparent;
      border: none;
      padding: 0;
    }

    .content blockquote {
      border-left: 4px solid var(--accent);
      margin-left: 0;
      padding: 4px 0 4px 14px;
      color: var(--muted);
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1em;
      display: block;
      overflow-x: auto;
    }

    .content th,
    .content td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .main {
        padding: 16px;
      }
      .content {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
</body>
</html>
