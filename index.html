<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Satzung der Fachschaft Informatik</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2a;
      --panel-2: #1a2338;
      --text: #eef2ff;
      --muted: #9fb0d0;
      --border: #2b3958;
      --accent: #7aa2ff;
      --accent-2: #b7cbff;
      --code: #0f1728;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1324 100%);
      color: var(--text);
    }

    /* Neu hinzugefügt für das Grid-Layout (Desktop) */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100%;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      height: 100%;
    }

    .brand {
      margin-bottom: 24px;
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.45;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    /* Links im Menü anpassen */
    .file-item {
      text-decoration: none;
      color: var(--text);
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.02);
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    
    .file-item:hover, .file-item.active {
      background: var(--panel-2);
      border-color: var(--border);
    }

    .file-title {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .file-path {
      display: block;
      color: var(--muted);
      font-size: .86rem;
      word-break: break-all;
    }

    .main {
      min-width: 0;
      padding: 28px;
      overflow-y: auto;
      height: 100%;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: .92rem;
    }

    .viewer {
      background: rgba(19, 26, 42, .86);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .status {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: .95rem;
      background: rgba(255,255,255,.02);
      display: flex;
      justify-content: space-between;
    }

    .content {
      padding: 34px;
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      line-height: 1.2;
      margin-top: 1.7em;
      margin-bottom: .65em;
    }

    .content h1 { font-size: 2rem; }
    .content h2 {
      font-size: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: .35em;
    }
    .content h3 { font-size: 1.2rem; }
    .content p,
    .content ul,
    .content ol,
    .content pre,
    .content blockquote {
      margin: 0 0 1em;
    }

    .content a {
      color: var(--accent-2);
      text-decoration: none;
    }

    .content a:hover { text-decoration: underline; }

    .content code {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      padding: .12em .38em;
      border-radius: 8px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: .92em;
    }

    .content pre {
      background: var(--code);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 16px;
      overflow: auto;
    }

    .content pre code {
      background: transparent;
      border: none;
      padding: 0;
    }

    .content blockquote {
      border-left: 4px solid var(--accent);
      margin-left: 0;
      padding: 4px 0 4px 14px;
      color: var(--muted);
    }

.content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1em;
      display: block;
      overflow-x: auto;
    }

    .content th,
    .content td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .main {
        padding: 16px;
      }
      .content {
        padding: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Fachschaft Informatik</h1>
        <p>Dokumenten-Viewer</p>
      </div>
      <div class="file-list" id="file-list">
        </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="pill" id="current-file-badge">Keine Datei gewählt</span>
        </div>
      </div>

      <div class="viewer">
        <div class="status">
          <span id="viewer-status">Bereit</span>
        </div>
        <div class="content" id="markdown-content">
          Bitte wähle eine Datei aus der Seitenleiste.
        </div>
      </div>
    </main>
  </div>
    <script>
    const folderPath = "pages";

    const fileListEl = document.getElementById('file-list');
    const contentEl = document.getElementById('markdown-content');
    const badgeEl = document.getElementById('current-file-badge');
    const statusEl = document.getElementById('viewer-status');

    // 2. Funktion zum Laden der Dateiliste über die GitHub API
    async function fetchFileList() {
      statusEl.textContent = "Lade Dateiliste...";
      try {
        const response = await fetch(`https://api.github.com/repos/roffinator3000/Satzungen/contents/${folderPath}`);
        if (!response.ok) throw new Error("API-Limit erreicht oder Repo/Ordner nicht gefunden");
        
        const data = await response.json();
        
        // Nur .md Dateien herausfiltern und alphabetisch sortieren
        const mdFiles = data
          .filter(file => file.name.endsWith('.md'))
          .map(file => file.name)
          .sort();

        if (mdFiles.length === 0) {
          contentEl.innerHTML = "<p>Keine Markdown-Dateien im Ordner gefunden.</p>";
          statusEl.textContent = "Leer";
          return;
        }

        buildMenu(mdFiles);
      } catch (error) {
        contentEl.innerHTML = `<h2 style="color: #ff7a7a;">Fehler beim Laden der Dateiliste</h2>
                               <p class="muted">${error.message}</p>
                               <p>Stelle sicher, dass Repository-Name und Benutzername im Skript korrekt sind.</p>`;
        statusEl.textContent = "Fehler";
      }
    }

    // 3. Menü aufbauen (wird aufgerufen, sobald die Liste geladen ist)
    function buildMenu(files) {
      fileListEl.innerHTML = ""; // Vorheriges leeren
      
      files.forEach((filename, index) => {
        const a = document.createElement('a');
        a.href = "#";
        a.className = "file-item";
        
        const title = filename.replace('.md', '').replace(/-/g, ' ');

        a.innerHTML = `
          <span class="file-title">${title.toUpperCase()}</span>
          <span class="file-path">${folderPath}/${filename}</span>
        `;

        a.addEventListener('click', (e) => {
          e.preventDefault();
          loadMarkdownFile(filename, a);
        });

        fileListEl.appendChild(a);

        // Erste Datei standardmäßig laden
        if (index === 0) {
          loadMarkdownFile(filename, a);
        }
      });
    }

    // 4. Funktion zum Laden und Rendern des Datei-Inhalts
    async function loadMarkdownFile(filename, linkElement) {
      document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
      if(linkElement) linkElement.classList.add('active');

      statusEl.textContent = "Lade Inhalt...";
      badgeEl.textContent = `${folderPath}/${filename}`;

      try {
        const response = await fetch(`${folderPath}/${filename}`);
        if (!response.ok) throw new Error(`HTTP Fehler ${response.status}`);
        
        const markdownText = await response.text();
        contentEl.innerHTML = marked.parse(markdownText);
        statusEl.textContent = "Erfolgreich geladen";
      } catch (error) {
        contentEl.innerHTML = `<h2 style="color: #ff7a7a;">Fehler beim Laden</h2>
                               <p>Die Datei <code>${folderPath}/${filename}</code> konnte nicht geladen werden.</p>`;
        statusEl.textContent = "Fehler";
      }
    }

    fetchFileList();
  </script>
</body>
</html>
