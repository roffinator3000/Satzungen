<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Satzung FSR Informatik</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2a;
      --panel-2: #1a2338;
      --text: #eef2ff;
      --muted: #9fb0d0;
      --border: #2b3958;
      --accent: #7aa2ff;
      --accent-2: #b7cbff;
      --code: #0f1728;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    html {
      scroll-behavior: smooth; 
    }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1324 100%);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100%;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
      height: 100%;
    }

    .brand {
      margin-bottom: 24px;
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: 1.2rem;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.45;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .file-item {
      text-decoration: none;
      color: var(--text);
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.02);
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    
    .file-item:hover, .file-item.active {
      background: var(--panel-2);
      border-color: var(--border);
    }

    .file-title {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .file-path {
      display: block;
      color: var(--muted);
      font-size: .86rem;
      word-break: break-all;
    }

    .main {
      min-width: 0;
      padding: 28px;
      overflow-y: auto;
      height: 100%;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .viewer {
      background: rgba(19, 26, 42, .86);
      overflow: hidden;
    }

    .content {
      padding: 34px;
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      line-height: 1.2;
      margin-top: 1.7em;
      margin-bottom: .65em;
    }

    .content h1 { font-size: 2.1rem; }
    .content h2 {
      font-size: 1.75rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: .35em;
    }
    .content h3 { font-size: 1.22rem; }
    .content p,
    .content ul,
    .content ol,
    .content pre,
    .content blockquote {
      margin: 0 0 1em;
    }

    .content a {
      color: var(--accent-2);
      text-decoration: none;
    }

    .content a:hover { text-decoration: underline; }

    .content code {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.08);
      padding: .12em .38em;
      border-radius: 8px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: .92em;
    }

    .content pre {
      background: var(--code);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 16px;
      overflow: auto;
    }

    .content pre code {
      background: transparent;
      border: none;
      padding: 0;
    }

    .content blockquote {
      border-left: 4px solid var(--accent);
      margin-left: 0;
      padding: 4px 0 4px 14px;
      color: var(--muted);
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1em;
      display: block;
      overflow-x: auto;
    }

    .content th,
    .content td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
    }

    .muted {
      color: var(--muted);
    }
    
    /* Styling für die Buttons */
    .toggle-btn {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle-btn:hover {
      background: var(--border);
    }

    /* Layout für den Sidebar-Kopfbereich */
    .brand-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    /* Versteckte Sidebar */
    .app.sidebar-closed {
      grid-template-columns: 1fr;
    }

    .app.sidebar-closed .sidebar {
      display: none;
    }

    /* Top-Bar im Hauptbereich (nur sichtbar, wenn Sidebar zu ist) */
    .top-bar {
      margin-bottom: 16px;
      display: none; 
    }

    .app.sidebar-closed .top-bar {
      display: flex;
    }
    
    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .main {
        padding: 16px;
      }
      .content {
        padding: 22px;
      }
    }
    
    @media print {
      /* Versteckt den "Menü öffnen"-Button und die Leiste drumherum */
      .top-bar, 
      #open-sidebar, 
      #close-sidebar {
        display: none !important;
      }

      /* Versteckt auch die Seitenleiste komplett beim Drucken */
      .sidebar {
        display: none !important;
      }

      /* Sorgt dafür, dass der Text die volle Seitenbreite nutzt */
      .app {
        display: block !important;
      }
    }
  </style>
</head><body>
  <div class="app" id="app-container">
    
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-header">
          <h1>WIP: Satzung</h1>
          <button class="toggle-btn" id="close-sidebar" title="Menü schließen">✖</button>
        </div>
        <p>Fachschaftsrat Informatik</p>
        <br>
        <p>Anzeige:</p>
        <p id="current-file-badge">Datei wählen</p>
        <p id="viewer-status">Bereit</p>
      </div>
      <div class="file-list" id="file-list">
      </div>
    </aside>

    <main class="main">
      <div class="top-bar">
        <button class="toggle-btn" id="open-sidebar" title="Menü öffnen">☰</button>
      </div>

      <div class="viewer">
        <div class="content" id="markdown-content">
          Bitte wähle eine Datei aus der Seitenleiste.
        </div>
      </div>
    </main>
    
  </div>

  <script>
    const folderPath = "pages";

    const fileListEl = document.getElementById('file-list');
    const contentEl = document.getElementById('markdown-content');
    const badgeEl = document.getElementById('current-file-badge');
    const statusEl = document.getElementById('viewer-status');
    
    const appContainer = document.getElementById('app-container');
    const closeBtn = document.getElementById('close-sidebar');
    const openBtn = document.getElementById('open-sidebar');

    closeBtn.addEventListener('click', () => {
      appContainer.classList.add('sidebar-closed');
    });

    openBtn.addEventListener('click', () => {
      appContainer.classList.remove('sidebar-closed');
    });

    // Laden der Dateiliste über die GitHub API
    async function fetchFileList() {
      statusEl.textContent = "Lade Dateiliste...";
      try {
        const response = await fetch(`https://api.github.com/repos/roffinator3000/Satzungen/contents/${folderPath}`);
        if (!response.ok) throw new Error("API-Limit erreicht oder Repo/Ordner nicht gefunden");
        
        const data = await response.json();
        
        // .md Dateien herausfiltern und alphabetisch sortieren
        const mdFiles = data
          .map(file => file.name)
          .filter(file => file.endsWith('.md'))
          .sort();

        if (mdFiles.length === 0) {
          contentEl.innerHTML = "<p>Keine Markdown-Dateien im Ordner gefunden.</p>";
          statusEl.textContent = "Leer";
          return;
        }

        buildMenu(mdFiles);
      } catch (error) {
        contentEl.innerHTML = `<h2 style="color: #ff7a7a;">Fehler beim Laden der Dateiliste</h2>
                               <p class="muted">${error.message}</p>
                               <p>Stelle sicher, dass Repository-Name und Benutzername im Skript korrekt sind.</p>`;
        statusEl.textContent = "Fehler";
      }
    }

    function buildMenu(files) {
      fileListEl.innerHTML = ""; // Vorheriges leeren
      
      // "Alle anzeigen" Button
      const allBtn = document.createElement('a');
      allBtn.href = "#";
      allBtn.className = "file-item";
      allBtn.innerHTML = `
        <span class="file-title" style="color: var(--accent-2);">SATZUNG</span>
        <span class="file-path">Gesamtes Dokument</span>
      `;
      
      allBtn.addEventListener('click', (e) => {
        e.preventDefault();
        loadAllMarkdownFiles(files, allBtn);
        if (window.innerWidth <= 920) {
          appContainer.classList.add('sidebar-closed');
        }
      });
      
      fileListEl.appendChild(allBtn);

      files.forEach((filename) => {
        const a = document.createElement('a');
        a.href = "#";
        a.className = "file-item";
        
        const title = filename.replace('.md', '').replace(/-/g, ' ');

        a.innerHTML = `
          <span class="file-title">${title.toUpperCase()}</span>
          <span class="file-path">${folderPath}/${filename}</span>
        `;

        a.addEventListener('click', (e) => {
          e.preventDefault();
          loadMarkdownFile(filename, a);
          
          if (window.innerWidth <= 920) {
            appContainer.classList.add('sidebar-closed');
          }
        });

        fileListEl.appendChild(a);
      });

      // Beim Starten direkt alle Dokumente laden
      loadAllMarkdownFiles(files, allBtn);
    }

    // Funktion zum Laden und Rendern einer EINZELNEN Datei
    async function loadMarkdownFile(filename, linkElement) {
      document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
      if(linkElement) linkElement.classList.add('active');

      statusEl.textContent = "Lade Inhalt...";
      if (badgeEl) badgeEl.textContent = `${filename}`;

      try {
        const response = await fetch(`${folderPath}/${filename}`);
        if (!response.ok) throw new Error(`HTTP Fehler ${response.status}`);
        
        const markdownText = await response.text();
        contentEl.innerHTML = marked.parse(markdownText);
        statusEl.textContent = "Erfolgreich geladen";
      } catch (error) {
        contentEl.innerHTML = `<h2 style="color: #ff7a7a;">Fehler beim Laden</h2>
                               <p>Die Datei <code>${folderPath}/${filename}</code> konnte nicht geladen werden.</p>`;
        statusEl.textContent = "Fehler";
      }
    }

    // Funktion zum Laden ALLER Dateien inkl. dynamischem Inhaltsverzeichnis
    async function loadAllMarkdownFiles(files, linkElement) {
      document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
      if(linkElement) linkElement.classList.add('active');

      statusEl.textContent = "Lade alle Inhalte...";
      if (badgeEl) badgeEl.textContent = "Gesamtes Dokument";

      try {
        // Lädt alle Dateien parallel herunter, behält aber den Dateinamen bei
        const fetchPromises = files.map(filename => 
          fetch(`${folderPath}/${filename}`).then(res => {
            if (!res.ok) throw new Error(`HTTP Fehler bei ${filename}`);
            return res.text().then(text => ({ filename, text }));
          })
        );

        const results = await Promise.all(fetchPromises);
        let combinedHtml = "";

        // Baut das HTML zusammen
        results.forEach(({ filename, text }) => {
          // Prüfen, ob das die Inhalts-Datei ist
          if (filename.toLowerCase().includes("01-inhalt")) {
            // Platzhalter für das dynamische Inhaltsverzeichnis einfügen
            combinedHtml += `<div id="dynamic-toc"></div>`;
          } else {
            combinedHtml += marked.parse(text);
          }
        });

        contentEl.innerHTML = combinedHtml;

        // Inhaltsverzeichnis (ToC) generieren
        statusEl.textContent = "Erstelle Inhaltsverzeichnis";
        const tocContainer = document.getElementById('dynamic-toc');
        if (tocContainer) {
          let tocHTML = "<h1>Satzung der Fachschaft Informatik</h1><br><h2>Inhalt</h2><ul style='padding-left: 0;'>";
          
          // Alle Überschriften im gerenderten Text suchen (h2 und h3 sind meist relevant)
          const headings = contentEl.querySelectorAll('h2, h3, h4');
          
          headings.forEach((heading) => {
             // Die Überschrift des Inhaltsverzeichnisses selbst überspringen
             if (heading.textContent === "Inhalt") return;
             if (heading.textContent === "Fachschaftsrat Informatik der Hochschule Bonn-Rhein-Sieg") return;

             // Falls marked.js keine ID vergeben hat, generieren wir eine
             if (!heading.id) {
               heading.id = heading.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-');
             }
             
             // Einrückung basierend auf der Überschriften-Ebene (h2 = 0px, h3 = 20px, etc.)
             const level = parseInt(heading.tagName.substring(1));
             const indent = (level - 2) * 20; 

             tocHTML += `<li style="margin-left: ${indent}px; list-style-type: none; margin-bottom: 8px;">
                           <a href="#${heading.id}" style="color: var(--accent); text-decoration: none;">
                             ${heading.textContent}
                           </a>
                         </li>`;
          });
          tocHTML += "</ul><hr style='border: 0; border-bottom: 1px solid var(--border); margin: 2em 0;'>";
          
          tocContainer.innerHTML = tocHTML;
        }

        statusEl.textContent = "Alle geladen";
      } catch (error) {
        contentEl.innerHTML = `<h2 style="color: #ff7a7a;">Fehler beim Laden</h2>
                               <p>Eine oder mehrere Dateien konnten nicht geladen werden.</p>
                               <p class="muted">${error.message}</p>`;
        statusEl.textContent = "Fehler";
      }
    }

    fetchFileList();
  </script>
</body>
</html>
